name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Only check apps that have been brought up to ruff-clean standard.
      # Untouched apps (0Global_analyzer, bitmap_maker, etc.) are excluded
      # until they are individually cleaned up.
      - name: Ruff check
        run: |
          ruff check \
            apps/TRPL_Analysis/ \
            apps/XRD_peak_finder/ \
            apps/NMR_Analysis/ \
            apps/EQE_Analysis/ \
            apps/AbsPL_Analysis/ \
            apps/JV-Analysis/ \
            apps/MPPT_Analysis/ \
            apps/DesignOfExperiments/ \
            shared/ \
            tests/ \
            scripts/

  test:
    name: "Tests: ${{ matrix.suite }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: TRPL_Analysis
            pythonpath: apps/TRPL_Analysis
          - suite: XRD_peak_finder
            pythonpath: apps/XRD_peak_finder
          - suite: NMR_Analysis
            pythonpath: apps/NMR_Analysis
          - suite: EQE_Analysis
            pythonpath: apps/EQE_Analysis
          - suite: AbsPL_Analysis
            pythonpath: apps/AbsPL_Analysis
          - suite: JV-Analysis
            pythonpath: apps/JV-Analysis
          - suite: MPPT_Analysis
            pythonpath: apps/MPPT_Analysis
          - suite: DesignOfExperiments
            pythonpath: apps/DesignOfExperiments
          - suite: shared
            pythonpath: shared

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared package
        run: pip install -e shared/

      - name: Install test dependencies
        run: |
          pip install \
            numpy \
            pydantic \
            scipy \
            plotly \
            natsort \
            ipywidgets \
            ipython \
            pytest \
            pytest-mock \
            lmfit \
            uncertainties

      - name: Run tests (no live)
        env:
          PYTHONPATH: ${{ matrix.pythonpath }}
        run: python -m pytest tests/${{ matrix.suite }}/ -v -m "not live"
